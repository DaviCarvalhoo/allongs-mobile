services:
  postgres:
    image: postgres:15-alpine
    container_name: allongs_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: allongs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
  api:
    image: denoland/deno:alpine
    container_name: allongs_api
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3001:3001"
    env_file:
      - .env
    command: deno run -A --watch --sloppy-imports src/server.ts
    depends_on:
      - postgres

volumes:
  pgdata:
